<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Logarithmic Transformation</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #f7f4ee;
  font-family: Georgia, 'Times New Roman', serif;
  color: #1a1814;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 8px;
  overflow: hidden;
}
h1 {
  font-size: 0.9rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 1px;
  flex-shrink: 0;
}
.sub {
  font-style: italic;
  font-size: 0.74rem;
  color: #6b6356;
  text-align: center;
  margin-bottom: 3px;
  flex-shrink: 0;
}
.svg-wrap {
  width: 100%;
  max-width: 460px;
  flex: 1 1 0;
  min-height: 0;
  aspect-ratio: 1 / 1;
  border: 1px solid #c8c0b0;
  background: #fdfaf4;
  box-shadow: 3px 3px 0 #c8c0b0;
  -webkit-user-select: none;
  user-select: none;
}
.svg-wrap svg { display: block; width: 100%; height: 100%; }

.slider-row {
  width: 100%;
  max-width: 460px;
  flex-shrink: 0;
  margin-top: 5px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 4px;
}
.slider-label {
  font-size: 0.75rem;
  color: #6b6356;
  font-style: italic;
  white-space: nowrap;
  min-width: 80px;
}
.slider-label.right {
  text-align: right;
  min-width: 80px;
}
input[type=range] {
  flex: 1;
  height: 4px;
  accent-color: #5B2D8E;
  cursor: pointer;
}
.t-display {
  font-family: 'Courier New', monospace;
  font-size: 0.78rem;
  color: #5B2D8E;
  min-width: 38px;
  text-align: center;
}

.controls {
  width: 100%;
  max-width: 460px;
  flex-shrink: 0;
  margin-top: 4px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
}
.btn {
  padding: 4px 2px;
  border: 1px solid #c8c0b0;
  background: #fdfaf4;
  font-family: Georgia, serif;
  font-size: 0.68rem;
  color: #3a3530;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  box-shadow: 1px 1px 0 #c8c0b0;
  user-select: none;
}
.btn.on { background: #eee8dc; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.legend {
  width: 100%;
  max-width: 460px;
  flex-shrink: 0;
  margin-top: 3px;
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  font-size: 0.68rem;
  color: #6b6356;
  font-style: italic;
}
.leg-item { display: flex; align-items: center; gap: 4px; }
.leg-swatch { width: 16px; height: 2px; }
</style>
</head>
<body>

<h1>The Logarithmic Transformation</h1>
<p class="sub">Drag the slider: linear coordinates &nbsp;&rarr;&nbsp; log-log coordinates</p>

<div class="svg-wrap" id="svgwrap">
  <svg id="mainsvg" viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="slider-row">
  <span class="slider-label">linear (t=0)</span>
  <input type="range" id="tslider" min="0" max="1000" value="0" step="1">
  <span class="slider-label right">log-log (t=1)</span>
  <span class="t-display" id="tdisplay">t=0.00</span>
</div>

<div class="controls">
  <button class="btn on" onclick="tog('hyp',this)"><span class="dot" style="background:#884488"></span>xy=1</button>
  <button class="btn on" onclick="tog('comp',this)"><span class="dot" style="background:#aa3300"></span>x+y=1</button>
  <button class="btn on" onclick="tog('diag',this)"><span class="dot" style="background:#888"></span>x=y</button>
  <button class="btn on" onclick="tog('grid',this)"><span class="dot" style="background:#c8c0b0"></span>Grid</button>
  <button class="btn on" onclick="tog('labels',this)"><span class="dot" style="background:#6b6356"></span>Labels</button>
</div>

<div class="legend">
  <div class="leg-item"><div class="leg-swatch" style="background:#884488"></div>xy=1 &nbsp;(reciprocal locus)</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#aa3300"></div>x+y=1 &nbsp;(complement locus)</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#888;border-top:1px dashed #888;height:0"></div>x=y &nbsp;(identity locus)</div>
</div>

<script>
(function(){
  const VW=460, VH=460;

  // We work in the first quadrant only: x,y in (0, WMAX]
  // Linear world: x,y in [0, WMAX]
  // Log world: log(x),log(y) in [log(WMIN), log(WMAX)]
  const WMIN=0.05, WMAX=5.0;
  const LMIN=Math.log(WMIN), LMAX=Math.log(WMAX);

  // Square plot area
  const ML=48, MR=14, MT=14, MB=34;
  const PW=VW-ML-MR, PH=VH-MT-MB;

  // At parameter t, map world coord w to screen
  // Linear: normalized 0..1 = w/WMAX
  // Log: normalized 0..1 = (log(w)-LMIN)/(LMAX-LMIN)
  function worldToNorm(w, t){
    if(w<=0) return -999;
    const lin = w/WMAX;
    const log_ = (Math.log(w)-LMIN)/(LMAX-LMIN);
    return (1-t)*lin + t*log_;
  }
  function normToScreen(nx, ny){
    return [ML + nx*PW, MT + (1-ny)*PH];
  }
  function wts(wx, wy, t){
    return normToScreen(worldToNorm(wx,t), worldToNorm(wy,t));
  }

  const NS='http://www.w3.org/2000/svg';
  const svg=document.getElementById('mainsvg');

  function el(tag,attrs,parent){
    const e=document.createElementNS(NS,tag);
    for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
    if(parent) parent.appendChild(e);
    return e;
  }
  function txt(s,attrs,parent){
    const e=el('text',attrs,parent); e.textContent=s; return e;
  }
  function makePath(pts, closed){
    if(pts.length<2) return '';
    let d=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
    for(let i=1;i<pts.length;i++)
      d+=` L${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`;
    if(closed) d+='Z';
    return d;
  }

  let show={hyp:true,comp:true,diag:true,grid:true,labels:true};
  let T=0; // 0..1

  window.tog=function(key,btn){
    show[key]=!show[key];
    btn.classList.toggle('on',show[key]);
    render();
  };

  // Background
  el('rect',{x:0,y:0,width:VW,height:VH,fill:'#fdfaf4'},svg);

  // All dynamic content in one group, cleared on each render
  const gAll=el('g',{},svg);

  function inBounds(sx,sy){
    return sx>=ML-2&&sx<=ML+PW+2&&sy>=MT-2&&sy<=MT+PH+2;
  }

  function render(){
    const t=T;
    gAll.innerHTML='';

    // ── Plot border ──
    el('rect',{x:ML,y:MT,width:PW,height:PH,
      fill:'none',stroke:'#c8c0b0','stroke-width':'0.8'},gAll);

    // ── Grid lines ──
    if(show.grid){
      const gGrid=el('g',{'stroke-width':'0.4',stroke:'#e0d8cc'},gAll);
      // Vertical lines x=c
      const xvals=[0.1,0.2,0.5,1,2,3,4,5];
      for(const xv of xvals){
        const pts=[];
        for(let yv=WMIN;yv<=WMAX+0.01;yv+=0.05){
          const[sx,sy]=wts(xv,yv,t);
          if(inBounds(sx,sy)) pts.push([sx,sy]);
        }
        if(pts.length>1) el('path',{d:makePath(pts),fill:'none'},gGrid);
      }
      // Horizontal lines y=c
      for(const yv of xvals){
        const pts=[];
        for(let xv=WMIN;xv<=WMAX+0.01;xv+=0.05){
          const[sx,sy]=wts(xv,yv,t);
          if(inBounds(sx,sy)) pts.push([sx,sy]);
        }
        if(pts.length>1) el('path',{d:makePath(pts),fill:'none'},gGrid);
      }
    }

    // ── Axes (the x and y axes themselves, which curve under log) ──
    // x-axis: y->0, but y=0 is undefined for log; show y=WMIN as the axis
    // Actually draw the axes as the boundary lines of the plot,
    // but also draw the "true" axes as curves that show where x=const lines go
    // The axis lines in world space are x->0 (left) and y->0 (bottom)
    // In log coords these recede to -infinity, so we show them as the plot edges

    // ── Diagonal x=y ──
    if(show.diag){
      const pts=[];
      for(let v=WMIN;v<=WMAX;v+=0.04){
        const[sx,sy]=wts(v,v,t);
        if(inBounds(sx,sy)) pts.push([sx,sy]);
      }
      if(pts.length>1)
        el('path',{d:makePath(pts),fill:'none',stroke:'#888888',
          'stroke-width':'1.4','stroke-dasharray':'6,3'},gAll);
    }

    // ── Hyperbola xy=1 ──
    if(show.hyp){
      const pts=[];
      for(let xv=WMIN;xv<=WMAX;xv+=0.015){
        const yv=1/xv;
        if(yv<WMIN||yv>WMAX) continue;
        const[sx,sy]=wts(xv,yv,t);
        if(inBounds(sx,sy)) pts.push([sx,sy]);
      }
      if(pts.length>1)
        el('path',{d:makePath(pts),fill:'none',stroke:'#884488',
          'stroke-width':'2.2'},gAll);
    }

    // ── Complement locus x+y=1 ──
    if(show.comp){
      const pts=[];
      for(let xv=0.01;xv<=0.99;xv+=0.008){
        const yv=1-xv;
        if(yv<WMIN) continue;
        const[sx,sy]=wts(xv,yv,t);
        if(inBounds(sx,sy)) pts.push([sx,sy]);
      }
      if(pts.length>1)
        el('path',{d:makePath(pts),fill:'none',stroke:'#aa3300',
          'stroke-width':'2.2'},gAll);
    }

    // ── Axis lines (drawn as world boundary, curving under t) ──
    // Draw x-axis as a dense set of points at y=very small
    {
      // Bottom axis: y=WMIN, varies x
      const axPts=[];
      for(let xv=WMIN;xv<=WMAX;xv+=0.04){
        const[sx,sy]=wts(xv,WMIN,t);
        if(sx>=ML&&sx<=ML+PW) axPts.push([sx,sy]);
      }
      // Left axis: x=WMIN, varies y
      const ayPts=[];
      for(let yv=WMIN;yv<=WMAX;yv+=0.04){
        const[sx,sy]=wts(WMIN,yv,t);
        if(sy>=MT&&sy<=MT+PH) ayPts.push([sx,sy]);
      }

      // At t=0 these should be the straight bottom and left edges
      // At t=1 they curve
      if(axPts.length>1)
        el('path',{d:makePath(axPts),fill:'none',stroke:'#1a1814','stroke-width':'1.8'},gAll);
      if(ayPts.length>1)
        el('path',{d:makePath(ayPts),fill:'none',stroke:'#1a1814','stroke-width':'1.8'},gAll);
    }

    // ── Tick marks and labels ──
    if(show.labels){
      const gLbl=el('g',{fill:'#3a3530','font-family':'Georgia,serif','font-size':'10'},gAll);
      const gTick=el('g',{stroke:'#1a1814','stroke-width':'0.8'},gAll);
      const tickVals=[0.5,1,2,3,4,5];
      for(const v of tickVals){
        // x tick
        const[sx,sy]=wts(v,WMIN,t);
        if(sx>=ML&&sx<=ML+PW){
          el('line',{x1:sx.toFixed(1),y1:sy.toFixed(1),
            x2:sx.toFixed(1),y2:(sy+4).toFixed(1)},gTick);
          txt(v%1===0?String(v):v.toFixed(1),
            {x:sx.toFixed(1),y:(sy+14).toFixed(1),'text-anchor':'middle'},gLbl);
        }
        // y tick
        const[sx2,sy2]=wts(WMIN,v,t);
        if(sy2>=MT&&sy2<=MT+PH){
          el('line',{x1:(sx2-4).toFixed(1),y1:sy2.toFixed(1),
            x2:sx2.toFixed(1),y2:sy2.toFixed(1)},gTick);
          txt(v%1===0?String(v):v.toFixed(1),
            {x:(sx2-7).toFixed(1),y:(sy2+4).toFixed(1),'text-anchor':'end'},gLbl);
        }
      }
    }

    // ── Curve labels ──
    if(show.labels){
      const gCL=el('g',{'font-family':'Georgia,serif','font-size':'11','font-style':'italic'},gAll);

      // Hyperbola label — follow the curve to find a good label position
      if(show.hyp){
        const xLab=0.28, yLab=1/0.28;
        const[slx,sly]=wts(xLab,yLab,t);
        if(inBounds(slx,sly))
          txt('xy = 1',{x:(slx+6).toFixed(1),y:(sly-4).toFixed(1),
            fill:'#884488'},gCL);
      }
      // Complement label
      if(show.comp){
        const[slx,sly]=wts(0.15,0.85,t);
        if(inBounds(slx,sly))
          txt('x+y = 1',{x:(slx+6).toFixed(1),y:(sly-4).toFixed(1),
            fill:'#aa3300'},gCL);
      }
      // Diagonal label
      if(show.diag){
        const[slx,sly]=wts(3.5,3.5,t);
        if(inBounds(slx,sly))
          txt('x = y',{x:(slx+5).toFixed(1),y:(sly-4).toFixed(1),
            fill:'#888888'},gCL);
      }

      // State label
      const stateLabel = t<0.02 ? 'linear coordinates' :
                         t>0.98 ? 'log-log coordinates' :
                         'interpolating\u2026';
      txt(stateLabel,{x:(ML+PW-4).toFixed(1),y:(MT+16).toFixed(1),
        'text-anchor':'end',fill:'#5B2D8E',
        'font-family':'Georgia,serif','font-size':'10','font-style':'italic'},gAll);

      // At t=1, show the anti-diagonal annotation
      if(t>0.85 && show.hyp){
        const alpha=((t-0.85)/0.15).toFixed(2);
        const[ax1,ay1]=wts(0.4,2.5,t);
        const[ax2,ay2]=wts(2.5,0.4,t);
        if(inBounds(ax1,ay1)){
          const annEl=txt('xy=1 \u2192 u+v=0',
            {x:(ax1).toFixed(1),y:(ay1-8).toFixed(1),
            fill:'#884488','font-family':'Georgia,serif',
            'font-size':'9','font-style':'italic',opacity:alpha},gAll);
        }
      }
      // At t=0, show the linear annotation
      if(t<0.15 && show.comp){
        const alpha=(1-(t/0.15)).toFixed(2);
        const[ax,ay]=wts(0.5,0.5,t);
        if(inBounds(ax,ay))
          txt('x+y=1: straight line',
            {x:(ax+8).toFixed(1),y:(ay-8).toFixed(1),
            fill:'#aa3300','font-family':'Georgia,serif',
            'font-size':'9','font-style':'italic',opacity:alpha},gAll);
      }
    }

    // ── Intersection point (1,1) ──
    {
      const[hx,hy]=wts(1,1,t);
      if(inBounds(hx,hy)){
        el('circle',{cx:hx.toFixed(1),cy:hy.toFixed(1),r:5,
          fill:'#228833',stroke:'#fdfaf4','stroke-width':'1.5'},gAll);
        if(show.labels)
          txt('(1,1)',{x:(hx+7).toFixed(1),y:(hy-4).toFixed(1),
            fill:'#228833','font-family':'Georgia,serif',
            'font-size':'9','font-style':'italic'},gAll);
      }
    }

    // ── Fixed point (½,½) for complement ──
    if(show.comp){
      const[hx,hy]=wts(0.5,0.5,t);
      if(inBounds(hx,hy)){
        el('circle',{cx:hx.toFixed(1),cy:hy.toFixed(1),r:4,
          fill:'#aa3300',stroke:'#fdfaf4','stroke-width':'1.5'},gAll);
        if(show.labels)
          txt('(\u00bd,\u00bd)',{x:(hx+7).toFixed(1),y:(hy+4).toFixed(1),
            fill:'#aa3300','font-family':'Georgia,serif',
            'font-size':'9','font-style':'italic'},gAll);
      }
    }
  }

  // ── Slider ──
  const slider=document.getElementById('tslider');
  const tdisplay=document.getElementById('tdisplay');

  slider.addEventListener('input',function(){
    T=this.value/1000;
    tdisplay.textContent='t='+T.toFixed(2);
    render();
  });

  // Initial render
  render();

})();
</script>
</body>
</html>
